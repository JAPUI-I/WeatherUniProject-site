<section class="hero">
  <div class="hero__inner">
    <div class="stack-lg">
      <h1 class="hero__title" data-i18n="home.title"></h1>
      <p class="hero__text" data-i18n="home.text">
      </p>

      <div class="hero__actions">
        <button class="btn btn--primary" data-page="download" data-i18n="home.download"></button>
        <button class="btn btn--secondary" data-page="about" data-i18n="home.about"></button>
      </div>
    </div>
    <div class="hero__visual"> 
        <div class="hero__carousel">
          <div class="numbertext">1 / 3</div>
          <img src="assets\img\footprint-carbon.JPEG" alt="carbon-footprint">
        </div>

        <div class="hero__carousel">
          <div class="numbertext">2 / 3</div>
          <img src="assets\img\sticker.webp" alt="eco-bob">
        </div>

        <div class="hero__carousel">
          <div class="numbertext">3 / 3</div>
          <img src="assets\img\reduction.JPEG" alt="reduction">
        </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="section__header">
    <h2 class="section__title" data-i18n="home.features"></h2>
  </div>

  <div class="card-grid">
    <article class="card">
      <h3 class="card_title" data-i18n="home.weather"></h3>
      <p class="card__text" data-i18n="home.weathertext"></p>
    </article>

    <article class="card">
      <h3 class="card_title" data-i18n="home.air"></h3>
      <p class="card__text" data-i18n="home.airtext"></p>
    </article>

    <article class="card">
      <h3 class="card_title" data-i18n="home.tracking"></h3>
      <p class="card__text" data-i18n="home.trackingtext"></p>
    </article>
  </div>
</section>
