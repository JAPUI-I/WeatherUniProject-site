<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="index.title" ></title>
  <link rel="stylesheet" href="./styles/global.css" />
  <link rel="icon" href="assets/icons/favicon/icons8-co2-32.png" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header__inner">
        <div class="site-logo">EcoMétéo</div>

        <nav class="site-nav">
          <button class="nav-button is-active" data-page="home" data-i18n="nav.home"></button>
          <button class="nav-button" data-page="download" data-i18n="nav.download"></button>
        </nav>

        <div class="site-nav">
        <button class="nav-button" data-page="faq" data-i18n="nav.faq"></button>
            <div class="lang-menu">
                <button class="lang-toggle" id="langToggle">
                    <span id="currentLang">FR</span>                    
                </button>

                <div class="lang-dropdown" id="langDropdown">
                    <button class="lang-item is-active" data-lang="fr">
                    <img src="assets/icons/flags/fr.png" alt="FR" />
                    Français
                    </button>

                    <button class="lang-item" data-lang="en">
                    <img src="assets/icons/flags/en.png" alt="EN" />
                    English
                    </button>

                    <button class="lang-item" data-lang="ru">
                    <img src="assets/icons/flags/ru.png" alt="RU" />
                    Русский
                    </button>

                    <button class="lang-item" data-lang="de">
                    <img src="assets/icons/flags/de.png" alt="DE" />
                    Deutch
                    </button>

                    <button class="lang-item" data-lang="ch">
                    <img src="assets/icons/flags/ch.png" alt="CH" />
                    中国人
                    </button>
                </div>
            </div>
        </div>
      </div>
    </header>

    <main id="page-content" class="site-main container"></main>

  <footer class="site-footer">
  <div class="container site-footer__inner">

    <div class="footer-grid">

      <div class="footer-column">
        <h3 class="footer-title">EcoMétéo</h3>
        <p class="footer-text" data-i18n="footer.description">
        </p>
      </div>

      <div class="footer-column">
        <h3 class="footer-title" data-i18n="footer.navigation"></h3>
        <ul class="footer-list">
          <li><a href="#" data-page="home" data-i18n="footer.home"></a></li>
          <li><a href="#" data-page="about" data-i18n="footer.about"></a></li>
          <li><a href="#" data-page="download" data-i18n="footer.download"></a></li>
          <li><a href="#" data-page="faq" data-i18n="footer.faq"></a></li>
        </ul>
      </div>

      <div class="footer-column">
        <h3 class="footer-title" data-i18n="footer.resources"></h3>
        <ul class="footer-list">
          <li><a href="https://github.com/" target="_blank">GitHub</a></li>
          <li><a href="mailto:ecometeo@contact.com">ecometeo@contact.com</a></li>
        </ul>
      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 EcoMétéo. <span data-i18n="footer.bottom"></span></p>
    </div>

  </div>
</footer>

  <script type="module" src="./scripts/main.js"></script>
  <script type="module" src="./scripts/i18n.js"></script>
</body>
</html>
